[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    security: security-related tests (auth gating, CSRF, SQL injection)
    smoke: minimal smoke tests for quick validation
    login: login and authentication tests
    navigation: top navbar tab tests
    tickets: ticket CRUD tests
    units: units module tests
    facilities: facilities module tests
    search: search module tests
    reports: reports module tests
    dispatch: dispatch/routes module tests
    mobile: mobile view tests
    config: configuration page tests
    patient: patient form tests
    ajax: AJAX endpoint tests
    map: map and tile loading tests
    personnel: personnel module tests
